<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment Plan — Spec4 AI</title>
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      color: #f5f5f7;
      background: #0a0a0f;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #12121a;
      border-radius: 12px;
      padding: 3rem;
      border: 1px solid #2a2a3a;
    }

    /* Markdown Styles */
    h1, h2, h3, h4, h5, h6 {
      margin: 1.5rem 0 1rem;
      font-weight: 600;
    }
    h1 { font-size: 2rem; color: #1E88E5; margin-top: 0; }
    h2 { font-size: 1.5rem; color: #42A5F5; border-bottom: 2px solid #2a2a3a; padding-bottom: 0.5rem; }
    h3 { font-size: 1.25rem; color: #42A5F5; }
    h4 { font-size: 1.1rem; }
    h5, h6 { font-size: 1rem; }

    p { margin-bottom: 1rem; }

    a {
      color: #1E88E5;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    a:hover { border-bottom-color: #1E88E5; }

    code {
      background: #1a1a24;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.9em;
      color: #39FF14;
    }

    pre {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      overflow-x: auto;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.85rem;
    }
    pre code {
      background: none;
      padding: 0;
      color: #a0a0b0;
    }

    ul, ol {
      margin: 1rem 0 1rem 2rem;
    }
    li { margin-bottom: 0.5rem; }

    blockquote {
      border-left: 4px solid #1E88E5;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #a0a0b0;
      font-style: italic;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      border: 1px solid #2a2a3a;
      padding: 0.75rem;
      text-align: left;
    }
    th {
      background: #1a1a24;
      font-weight: 600;
      color: #1E88E5;
    }

    hr {
      border: none;
      border-top: 2px solid #2a2a3a;
      margin: 2rem 0;
    }

    .loading {
      text-align: center;
      color: #a0a0b0;
      padding: 2rem;
    }

    .error {
      background: rgba(237, 27, 46, 0.1);
      border: 1px solid rgba(237, 27, 46, 0.3);
      border-radius: 8px;
      padding: 1.5rem;
      color: #ff8a80;
      margin: 1rem 0;
    }

    @media (max-width: 768px) {
      body { padding: 1rem; }
      .container { padding: 1.5rem; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="content" class="loading">Loading deployment plan...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // Configure marked options
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // Fetch and render the markdown file
    fetch('./deployment-plan.md')
      .then(response => {
        if (!response.ok) {
          throw new Error(`Failed to load deployment plan (${response.status})`);
        }
        return response.text();
      })
      .then(markdown => {
        // Render markdown to HTML
        const html = marked.parse(markdown);
        document.getElementById('content').innerHTML = html;
        document.getElementById('content').classList.remove('loading');
      })
      .catch(error => {
        document.getElementById('content').innerHTML = `
          <div class="error">
            <strong>Error loading deployment plan:</strong><br>
            ${error.message}<br><br>
            Make sure <code>deployment-plan.md</code> exists in the same directory.
          </div>
        `;
        document.getElementById('content').classList.remove('loading');
      });
  </script>
</body>
</html>
